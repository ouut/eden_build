name: "Build"

on:
  workflow_call:
    inputs:
      build-id:
        description: 'Identifier for workflows and caching'
        type: string
        required: true
      devel:
        description: 'Development mode (disables update checker)'
        type: string
        required: true
      ref:
        description: 'Git ref to build (branch, tag, or commit SHA; empty = latest master)'
        type: string
        required: false
        default: ''
      patch-type:
        description: 'Which patch to apply: dsu, overlay-cpp, overlay-lua, or none'
        type: string
        required: false
        default: 'none'

env:
  BUILD_REF: ${{ inputs.ref }}
  DISABLE_ARM: ${{ vars.DISABLE_ARM }}
  SCCACHE_GHA_ENABLED: "true"
  CCACHE: "true"
  CPM_CACHE_VERSION: "v20"
  FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
  DEVEL: ${{ inputs.devel }}
  BUILD_ID: ${{ inputs.build-id }}
  TEMP_PATCH_NUMBER: ""
  FORCE_PGO: "false"

jobs:
  clone:
    outputs:
      cachever: ${{ steps.out.outputs.cachever }}
      pgo: ${{ steps.out.outputs.pgo }}
    name: Parse and Clone
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Parse Forgejo payload
        run: |
          echo '${{ toJSON(github.event.client_payload) }}' > ./payload.json
          jq . payload.json
          ./.ci/forgejo.sh --parse ${{ inputs.build-id }}

      - name: Load payload environment
        run: . ./.ci/fj/load-env.sh

      # for some amazing reason you can't pass env vars to reusable workflows
      - name: Setup Outputs
        id: out
        run: |
          echo "cachever=${CPM_CACHE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "pgo=${FORCE_PGO}" >> "$GITHUB_OUTPUT"

      - name: Clone
        run: ./.ci/forgejo.sh --clone ${{ inputs.build-id }}

      - name: Checkout ref
        if: ${{ inputs.ref != '' }}
        run: |
          echo "Checking out ref: ${{ inputs.ref }}"
          git -C eden fetch --all --tags
          git -C eden checkout "${{ inputs.ref }}"

      - name: Patch DSU
        if: ${{ inputs.patch-type == 'dsu' }}
        run: |
          echo "Applying DSU full controller patch..."
          sed -i 's/enable_udp_controller{linkage, false/enable_udp_controller{linkage, true/' \
            eden/src/common/settings.h
          grep -q 'enable_udp_controller{linkage, true' eden/src/common/settings.h && \
            echo "DSU patch applied successfully" || { echo "DSU patch FAILED"; exit 1; }

      - name: Apply Overlay (C++)
        if: ${{ inputs.patch-type == 'overlay-cpp' }}
        run: |
          echo "Applying Eden Overlay C++ patch..."
          FRONTEND="eden/src/hid_core/frontend"
          cp overlay/overlay_state.h "$FRONTEND/"
          cp overlay/overlay_udp.h   "$FRONTEND/"
          cp overlay/overlay_udp.cpp "$FRONTEND/"
          patch -p1 -d eden < patches/emulated_controller.h.patch
          patch -p1 -d eden < patches/emulated_controller.cpp.patch
          patch -p1 -d eden < patches/CMakeLists_hid_core.txt.patch
          grep -q 'ApplyOverlay' eden/src/hid_core/frontend/emulated_controller.cpp && \
            echo "Overlay C++ patch applied successfully" || { echo "Overlay patch FAILED"; exit 1; }

      - name: Apply Overlay (Lua)
        if: ${{ inputs.patch-type == 'overlay-lua' }}
        run: |
          echo "Applying Eden Overlay Lua patch..."
          FRONTEND="eden/src/hid_core/frontend"
          cp overlay/overlay_types.h  "$FRONTEND/"
          cp overlay/overlay_engine.h "$FRONTEND/"
          cp overlay/overlay_engine.cpp "$FRONTEND/"
          patch -p0 -d eden < overlay/patches/emulated_controller.h.patch
          patch -p0 -d eden < overlay/patches/emulated_controller.cpp.patch
          patch -p0 -d eden < overlay/patches/cpmfile.json.patch
          patch -p0 -d eden < overlay/patches/CMakeLists.txt.patch
          patch -p0 -d eden < overlay/patches/CMakeLists_hid_core.txt.patch
          grep -q 'overlay_slots' eden/src/hid_core/frontend/emulated_controller.h && \
            echo "Overlay Lua patch applied successfully" || { echo "Overlay patch FAILED"; exit 1; }

      # Clone step is still changing forgejo.env, due to a bug on Forgejo, send after it
      # <https://codeberg.org/forgejo/forgejo/issues/9601>
      - name: Upload payload environment
        uses: actions/upload-artifact@v7
        with:
          name: forgejo.env
          archive: false
          path: forgejo.env

      - name: Send pending status
        if: ${{ (inputs.build-id) == 'master' || (inputs.build-id) == 'pull_request' }}
        run: python3 ./.ci/common/status.py --pending

      - name: Apply Temporary Patch
        if: ${{ env.TEMP_PATCH_NUMBER != '' }}
        run: |
          wget https://git.eden-emu.dev/eden-emu/eden/pulls/${TEMP_PATCH_NUMBER}.patch
          git -C eden apply --3way --ignore-whitespace ../${TEMP_PATCH_NUMBER}.patch
          rm ${TEMP_PATCH_NUMBER}.patch

      - name: Summary
        run: |
          ./.ci/fj/summary.sh ${{ inputs.build-id }}

      - name: Cleanup
        run: |
          rm -rf eden/.git* eden/.ci eden/.github

      - name: Upload cloned repo
        uses: actions/upload-artifact@v7
        with:
          name: eden
          include-hidden-files: true
          path: |
            eden/*
            eden/.patch

      - name: Upload nightly changelog
        if: ${{ inputs.build-id == 'nightly' }}
        uses: actions/upload-artifact@v7
        with:
          path: nightly-changelog.md
          name: nightly-changelog.md
          archive: false

  source:
    if: ${{ inputs.build-id == 'pull_request' }}
    name: Source Pack
    runs-on: ubuntu-latest
    needs: [clone]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Forgejo environment
        uses: actions/download-artifact@v8
        with:
          name: forgejo.env

      - name: Load payload environment
        shell: bash
        run: . ./.ci/fj/load-env.sh

      - name: Clone
        uses: actions/download-artifact@v8
        with:
          name: eden

      - name: Load payload environment
        run: . ./.ci/fj/load-env.sh

      - name: Build
        run: ./.ci/source/build.sh

  deb:
    if: ${{ inputs.build-id == 'pull_request' || inputs.build-id == 'test' }}
    name: Debian
    needs: [clone]
    uses: ./.github/workflows/debian.yml
    with:
      build-id: '${{ inputs.build-id }}'
      cpm-cache-version: '${{ needs.clone.outputs.cachever }}'
      devel: ${{ inputs.devel }}
      debian-version: 13
    secrets: inherit

  linux:
    name: AppImage
    needs: [clone]
    uses: ./.github/workflows/appimage.yml
    with:
      build-id: '${{ inputs.build-id }}'
      cpm-cache-version: '${{ needs.clone.outputs.cachever }}'
      devel: ${{ inputs.devel }}
      force_pgo: ${{ needs.clone.outputs.pgo }}
    secrets: inherit

  windows:
    name: Windows
    needs: [clone]
    uses: ./.github/workflows/windows.yml
    with:
      build-id: '${{ inputs.build-id }}'
      cpm-cache-version: '${{ needs.clone.outputs.cachever }}'
      devel: ${{ inputs.devel }}
      force_pgo: ${{ needs.clone.outputs.pgo }}
    secrets: inherit

  android:
    name: Android
    needs: [clone]
    uses: ./.github/workflows/android.yml
    with:
      build-id: '${{ inputs.build-id }}'
      cpm-cache-version: '${{ needs.clone.outputs.cachever }}'
      devel: ${{ inputs.devel }}
    secrets: inherit

  macos:
    name: macOS
    needs: [clone]
    uses: ./.github/workflows/macos.yml
    with:
      build-id: '${{ inputs.build-id }}'
      cpm-cache-version: '${{ needs.clone.outputs.cachever }}'
      devel: ${{ inputs.devel }}
    secrets: inherit

  room:
    if: ${{ inputs.build-id == 'pull_request' || inputs.build-id == 'tag' || inputs.build-id == 'test' }}
    name: musl room
    needs: [clone]
    uses: ./.github/workflows/room.yml
    with:
      build-id: ${{ inputs.build-id }}
